<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#F8F4EE"><title>機票攻略 - SoftPlanet</title><link rel="stylesheet" href="css/style.css"></head><body><div class="app guide-page"><header class="site-header simple-header"><a class="back-link" href="index.html" aria-label="返回首頁">‹</a><a class="page-brand" href="index.html"><span>🐻</span><strong>機票攻略</strong></a><span class="header-spacer"></span></header><main><section class="page-intro"><p class="eyebrow">MUMU 的出發前小抄</p><h1>先看懂，再安心買票</h1><p>不追求一次找到完美票價，只把下單前最容易漏掉的事整理好。</p></section><section class="guide-stack"><article><span>🧾</span><div><h2>確認總價</h2><p>比較含稅、行李、選位與付款手續費後的最終金額。</p></div></article><article><span>🧳</span><div><h2>查看行李規則</h2><p>去回程可能不同，留意件數、重量與尺寸限制。</p></div></article><article><span>🕰️</span><div><h2>看清楚抵達時間</h2><p>紅眼班機要一起考慮交通、住宿入住與體力。</p></div></article><article><span>🔁</span><div><h2>確認退改規則</h2><p>廉航與特價票限制較多，下單前先看姓名與日期能否修改。</p></div></article><article class="mumu-tip"><span>🐻</span><div><h2>最後再慢慢看一次</h2><p>姓名拼音、日期、機場與航廈都確認後，再完成付款。</p></div></article></section></main><nav class="bottom-nav" aria-label="主要導覽"><a class="active" href="flight.html" aria-current="page"><span>✈️</span>機票攻略</a><a href="inspiration.html"><span>💡</span>旅行靈感</a><a href="trips.html"><span>🗺️</span>我的旅行</a><a href="packing.html"><span>🧳</span>行李攻略</a><a href="my.html"><span>👤</span>我的</a></nav></div><script src="js/script.js"></script></body></html>
