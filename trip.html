<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行詳情</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#faf8f4;
}

header{
    background:#fff;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

button{
    background:#4db6ac;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:12px 22px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.info{
    font-size:20px;
    margin:15px 0;
}

.section{
    margin-top:30px;
}

.item{
    padding:15px;
    border:1px solid #eee;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
🧳 我的旅行
</header>

<div class="container">

<div class="card">

<button onclick="location.href='my.html'">
← 返回我的旅行
</button>

<h2 id="tripTitle">載入中...</h2>

<div class="info">
國家：<span id="tripCountry">-</span>
</div>

<div class="info">
城市：<span id="tripCity">-</span>
</div>

</div>

<div class="card">

<h3>📍 收藏景點</h3>

<div class="section">
<div class="item">
目前尚未加入任何景點。
</div>
</div>

</div>

<div class="card">

<h3>🍜 收藏美食</h3>

<div class="section">
<div class="item">
目前尚未加入任何美食。
</div>
</div>

</div>

<div class="card">

<h3>🏨 收藏住宿</h3>

<div class="section">
<div class="item">
目前尚未加入任何住宿。
</div>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

window.spClient = window.supabase.createClient(
"https://ftlpxesmzchwzeurmupr.supabase.co",
"sb_publishable_5fxS5Fm4dqXNFIMyVtTm0w_gnncuTRh"
);

const params=new URLSearchParams(location.search);
const tripId=params.get("id");

async function loadTrip(){

if(!tripId){
alert("找不到旅行");
location.href="my.html";
return;
}

const {data,error}=await window.spClient
.from("trips")
.select("*")
.eq("id",tripId)
.single();

if(error){
alert(error.message);
return;
}

document.getElementById("tripTitle").innerText=data.title || "未命名旅行";
document.getElementById("tripCountry").innerText=data.country || "-";
document.getElementById("tripCity").innerText=data.city || "-";

}

loadTrip();

</script>

</body>
</html>
