<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測試景點收藏</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#faf8f4;}
header{background:#fff;padding:20px;text-align:center;font-size:28px;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.container{max-width:900px;margin:40px auto;padding:20px;}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
select{padding:12px;border-radius:8px;font-size:16px;}
button{margin-top:15px;padding:14px 24px;background:#4db6ac;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
#status{margin-top:20px;color:#666;}
</style>
</head>

<body>

<header>📍 測試景點收藏</header>

<div class="container">
<div class="card">

<h2>東京晴空塔</h2>
<p>這是一個測試景點。</p>

<select id="tripSelect"></select>
<br>

<button id="favoriteBtn">🤍 收藏到旅行</button>

<div id="status"></div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
window.spClient = window.supabase.createClient(
  "https://ftlpxesmzchwzeurmupr.supabase.co",
  "sb_publishable_5fxS5Fm4dqXNFIMyVtTm0w_gnncuTRh"
);

const PLACE_ID = "tokyo-skytree";

let currentUser = null;
let isFavorited = false;

const tripSelect = document.getElementById("tripSelect");
const favoriteBtn = document.getElementById("favoriteBtn");
const statusText = document.getElementById("status");

async function getUser(){
  const { data } = await window.spClient.auth.getUser();

  if(!data.user){
    location.href = "index.html";
    return null;
  }

  currentUser = data.user;
  return data.user;
}

async function loadTrips(){
  const { data, error } = await window.spClient
    .from("trips")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending:false });

  if(error){
    statusText.innerText = error.message;
    return;
  }

  if(!data || data.length === 0){
    tripSelect.innerHTML = `<option value="">請先建立旅行</option>`;
    return;
  }

  tripSelect.innerHTML = data.map(trip => `
    <option value="${trip.id}">${trip.title}</option>
  `).join("");

  await checkFavorite();
}

async function checkFavorite(){
  const tripId = tripSelect.value;

  if(!tripId){
    isFavorited = false;
    updateButton();
    return;
  }

  const { data, error } = await window.spClient
    .from("trip_places")
    .select("*")
    .eq("trip_id", tripId)
    .eq("place_id", PLACE_ID)
    .eq("user_id", currentUser.id);

  if(error){
    statusText.innerText = error.message;
    return;
  }

  isFavorited = data && data.length > 0;
  updateButton();
}

function updateButton(){
  if(isFavorited){
    favoriteBtn.innerText = "❤️ 已收藏（點一下取消）";
  }else{
    favoriteBtn.innerText = "🤍 收藏到旅行";
  }
}

tripSelect.onchange = async function(){
  statusText.innerText = "";
  await checkFavorite();
};

favoriteBtn.onclick = async function(){
  const tripId = tripSelect.value;

  if(!tripId){
    statusText.innerText = "請先選擇旅行。";
    return;
  }

  if(isFavorited){
    const { error } = await window.spClient
      .from("trip_places")
      .delete()
      .eq("trip_id", tripId)
      .eq("place_id", PLACE_ID)
      .eq("user_id", currentUser.id);

    if(error){
      statusText.innerText = "取消失敗：" + error.message;
      return;
    }

    isFavorited = false;
    statusText.innerText = "已取消收藏。";
    updateButton();
    return;
  }

  const { error } = await window.spClient
    .from("trip_places")
    .insert({
      trip_id: tripId,
      user_id: currentUser.id,
      place_id: PLACE_ID
    });

  if(error){
    statusText.innerText = "收藏失敗：" + error.message;
    return;
  }

  isFavorited = true;
  statusText.innerText = "收藏成功。";
  updateButton();
};

(async function(){
  await getUser();
  await loadTrips();
})();
</script>

</body>
</html>
