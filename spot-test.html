<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>測試景點收藏</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#faf8f4;}
header{background:#fff;padding:20px;text-align:center;font-size:28px;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.container{max-width:900px;margin:40px auto;padding:20px;}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
button,select{padding:12px;margin-top:12px;border-radius:8px;}
button{background:#4db6ac;color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<header>📍 測試景點收藏</header>

<div class="container">
<div class="card">
<h2>東京晴空塔</h2>
<p>這是一個測試景點。</p>

<select id="tripSelect">
<option value="">載入旅行中...</option>
</select>

<br>

<button id="saveBtn">❤️ 收藏到旅行</button>

<p id="status"></p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.spClient = window.supabase.createClient(
"https://ftlpxesmzchwzeurmupr.supabase.co",
"sb_publishable_5fxS5Fm4dqXNFIMyVtTm0w_gnncuTRh"
);

const PLACE_ID = "tokyo-skytree";
const tripSelect = document.getElementById("tripSelect");
const statusText = document.getElementById("status");

async function getUser(){
  const { data } = await window.spClient.auth.getUser();
  if(!data.user){
    statusText.innerText = "請先回首頁登入。";
    return null;
  }
  return data.user;
}

async function loadTrips(){
  const user = await getUser();
  if(!user) return;

  const { data, error } = await window.spClient
    .from("trips")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending:false });

  if(error){
    statusText.innerText = error.message;
    return;
  }

  if(!data || data.length === 0){
    tripSelect.innerHTML = `<option value="">請先建立旅行</option>`;
    return;
  }

  tripSelect.innerHTML = data.map(trip =>
    `<option value="${trip.id}">${trip.title}</option>`
  ).join("");
}

document.getElementById("saveBtn").onclick = async function(){
  const user = await getUser();
  if(!user) return;

  const tripId = tripSelect.value;

  if(!tripId){
    statusText.innerText = "請先選擇旅行。";
    return;
  }

  const { error } = await window.spClient
    .from("trip_places")
    .insert({
      user_id: user.id,
      trip_id: tripId,
      place_id: PLACE_ID
    });

  if(error){
    statusText.innerText = "收藏失敗：" + error.message;
    return;
  }

  statusText.innerText = "收藏成功。";
};

loadTrips();
</script>

</body>
</html>
