<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的旅行</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#faf8f4;}
header{background:#fff;padding:20px;text-align:center;font-size:28px;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.container{max-width:1000px;margin:40px auto;padding:20px;}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
button{background:#4db6ac;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;}
.trip{padding:15px;border-bottom:1px solid #eee;}
</style>
</head>

<body>
<header>🧳 我的旅行</header>

<div class="container">

<div class="card">
<h2>新增旅行</h2>
<input id="title" placeholder="旅行名稱，例如：東京五天四夜">
<input id="country" placeholder="國家，例如：日本">
<input id="city" placeholder="城市，例如：東京">
<button onclick="addTrip()">建立旅行</button>
</div>

<div class="card">
<h2>旅行清單</h2>
<div id="tripList">載入中...</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://ftlpxesmzchwzeurmupr.supabase.co",
  "sb_publishable_5fxS5Fm4dqXNFIMyVtTm0w_gnncuTRh"
);

async function getUser(){
  const { data } = await supabase.auth.getUser();
  if (!data.user) {
    alert("請先登入");
    location.href = "index.html";
    return null;
  }
  return data.user;
}

async function loadTrips(){
  const user = await getUser();
  if (!user) return;

  const { data, error } = await supabase
    .from("trips")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending:false });

  const list = document.getElementById("tripList");

  if (error) {
    list.innerHTML = "讀取失敗：" + error.message;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "目前還沒有建立任何旅行。";
    return;
  }

  list.innerHTML = data.map(t => `
    <div class="trip">
      <strong>${t.title}</strong><br>
      ${t.country || ""} ${t.city || ""}
    </div>
  `).join("");
}

async function addTrip() {
  alert("有點到建立旅行");

  const user = await getUser();
  if (!user) return;

  const title = document.getElementById("title").value.trim();
  const country = document.getElementById("country").value.trim();
  const city = document.getElementById("city").value.trim();

  if (!title) {
    alert("請輸入旅行名稱");
    return;
  }

  const { error } = await supabase.from("trips").insert({
    user_id: user.id,
    title: title,
    country: country,
    city: city
  });

  if (error) {
    alert("新增失敗：" + error.message);
    return;
  }

  alert("新增成功");

  document.getElementById("title").value = "";
  document.getElementById("country").value = "";
  document.getElementById("city").value = "";

  loadTrips();
}

  if (error) {
    alert("新增失敗：" + error.message);
    return;
  }

  document.getElementById("title").value = "";
  document.getElementById("country").value = "";
  document.getElementById("city").value = "";

  loadTrips();
});

loadTrips();
</script>

</body>
</html>
