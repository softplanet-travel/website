<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#F8F4EE"><title>我的旅行 - SoftPlanet</title><link rel="stylesheet" href="css/style.css?v=20260713-review2"></head><body>
<div class="app trips-page"><header class="site-header simple-header"><a class="back-link" href="index.html" aria-label="返回首頁">‹</a><a class="page-brand" href="index.html"><span class="mumu-asset mumu-asset-small" data-mumu aria-hidden="true"></span><strong>我的旅行</strong></a><a class="text-header-action" href="inspiration.html">找靈感</a></header><main>
<section class="page-intro compact-intro"><p class="eyebrow">MUMU 和你一起收好每一趟期待</p><h1>你的旅行，從一個名字開始</h1><p>先建立旅行，再把喜歡的地方慢慢放進來。</p></section>
<div id="sessionNotice"></div>
<section class="planner-form-card" id="plannerCard" aria-labelledby="createTripTitle"><h2 id="createTripTitle">建立一趟旅行</h2><form id="tripForm"><label for="title">旅行名稱</label><input id="title" name="title" required maxlength="60" placeholder="例如：東京五日慢旅行"><div class="form-row"><div><label for="country">國家／地區</label><input id="country" name="country" maxlength="40" placeholder="例如：日本"></div><div><label for="city">城市</label><input id="city" name="city" maxlength="40" placeholder="例如：東京"></div></div><button class="primary-btn" id="addTripBtn" type="submit">建立旅行</button><p class="status-message" id="statusText" role="status" aria-live="polite"></p></form></section>
<section class="trip-list-section" aria-labelledby="tripListTitle"><div class="section-head"><h2 id="tripListTitle">我的旅行</h2><span id="tripCount" class="count-badge"></span></div><div id="tripSearch"></div><div id="tripList" class="saved-trip-list" aria-live="polite"><div class="soft-loading"><span class="mumu-asset" data-mumu aria-hidden="true"></span><p>正在整理你的旅行…</p></div></div></section></main>
<nav class="bottom-nav" aria-label="主要導覽"><a href="flight.html"><span aria-hidden="true">✈️</span>機票攻略</a><a href="inspiration.html"><span aria-hidden="true">💡</span>旅行靈感</a><a class="active" href="trips.html" aria-current="page"><span aria-hidden="true">🗺️</span>我的旅行</a><a href="packing.html"><span aria-hidden="true">🧳</span>行李攻略</a><a href="my.html"><span aria-hidden="true">👤</span>我的</a></nav></div>
<dialog class="login-sheet" id="tripLoginSheet"><form method="dialog"><button class="sheet-close" value="cancel" aria-label="關閉">×</button><div class="dialog-bear mumu-asset" data-mumu aria-hidden="true"></div><h2>開始保存你的旅行</h2><p>登入後，MUMU 可以幫你把旅行、預算與記帳安心保存；訪客資料只留在這台裝置。</p><button class="primary-btn" id="tripGoogleLogin" value="google">使用 Google 登入</button><button class="secondary-btn" id="tripGuestLogin" value="guest">以訪客模式試用</button><p class="status-message" id="tripLoginStatus"></p></form></dialog>
<dialog class="confirm-dialog" id="deleteDialog"><form method="dialog"><div class="dialog-bear mumu-asset" data-mumu aria-hidden="true"></div><h2>要移除這趟旅行嗎？</h2><p>旅行裡收藏的地方也會一起移除。</p><div class="dialog-actions"><button class="secondary-btn" value="cancel">先保留</button><button class="danger-btn" id="confirmDeleteBtn" value="confirm">移除旅行</button></div></form></dialog>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-client.js"></script><script src="js/travel-store.js"></script><script src="js/search-component.js"></script><script src="js/trips.js"></script><script src="js/script.js"></script></body></html>
