<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的 - SoftPlanet</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#faf8f4;
}

header{
    background:#fff;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:20px;
    margin:20px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.item{
    background:#4db6ac;
    color:white;
    padding:30px;
    border-radius:12px;
    text-align:center;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
🌏 SoftPlanet 柔軟星球
</header>

<div class="container">

<h1>我的</h1>

<div class="card">
<h2>歡迎回來 👋</h2>
<p>之後會顯示會員資料。</p>
</div>

<div class="menu">

<div class="item">
❤️ 我的收藏
</div>

<div class="item">
🧳 我的旅行
</div>

<div class="item">
📝 我的攻略
</div>

<div class="item">
⚙️ 帳號設定
</div>

</div>

</div>

</body>
</html>
