<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F8F4EE">
  <title>我的 - SoftPlanet</title>
  <link rel="stylesheet" href="css/style.css?v=20260713-refinement">
</head>
<body>
  <div class="app my-page">
    <header class="site-header simple-header">
      <a class="back-link" href="index.html" aria-label="返回首頁">‹</a>
      <a class="page-brand" href="index.html"><span class="mumu-asset mumu-asset-small" data-mumu aria-hidden="true"></span><strong>我的</strong></a>
      <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <main>
      <section class="account-card" id="accountCard">
        <div class="mumu-avatar mumu-asset" data-mumu aria-hidden="true"></div>
        <div>
          <p class="eyebrow">My Space・Travel Identity</p>
          <h1 id="accountTitle">每一趟旅行，都值得好好保存。</h1>
          <p id="accountSubtitle">登入後即可同步你的旅行、收藏與攻略，換手機也不怕遺失。</p>
        </div>
        <button class="primary-btn account-action" id="accountAction" type="button" hidden>使用 Google 登入</button>
        <p class="status-message" id="accountStatus" role="status" aria-live="polite"></p>
      </section>

      <section class="profile-settings workspace-card" id="profileSettings" aria-labelledby="profileTitle">
        <p class="eyebrow">帳號設定</p>
        <h2 id="profileTitle">想讓 MUMU 怎麼稱呼你呢？</h2>
        <p>可以是暱稱、英文名字或家人熟悉的稱呼，不需要使用真實姓名。</p>
        <form class="workspace-form" id="preferredNameForm">
          <label>顯示稱呼
            <input id="preferredName" name="preferred_name" maxlength="20" required placeholder="例如：花花、小天、Joy">
            <small class="char-count"><span id="preferredNameCount">0</span> / 20</small>
          </label>
          <button class="primary-btn" type="submit">儲存稱呼</button>
          <p class="status-message" id="profileStatus" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="my-menu" aria-label="我的功能">
        <a href="favorites.html"><span class="menu-icon tone-peach" aria-hidden="true">♥</span><span><strong>我的收藏</strong><small>建立專屬旅行靈感庫，隨時加入下一趟旅行</small></span><span aria-hidden="true">›</span></a>
        <a href="trips.html"><span class="menu-icon tone-sand" aria-hidden="true">🧳</span><span><strong>我的旅行</strong><small>看看正在期待的旅程</small></span><span aria-hidden="true">›</span></a>
        <a href="guides.html"><span class="menu-icon tone-sage" aria-hidden="true">📝</span><span><strong>我的攻略</strong><small>收藏實用攻略，也能整理自己的旅行筆記</small></span><span aria-hidden="true">›</span></a>
        <a href="tools.html"><span class="menu-icon tone-aqua" aria-hidden="true">🧩</span><span><strong>旅行積木</strong><small>查看可加入每趟旅行的功能</small></span><span aria-hidden="true">›</span></a>
        <a href="#profileSettings"><span class="menu-icon tone-lavender" aria-hidden="true">⚙️</span><span><strong>帳號設定</strong><small>修改 MUMU 對你的稱呼</small></span><span aria-hidden="true">›</span></a>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主要導覽">
      <a href="flight.html"><span>✈️</span>機票攻略</a>
      <a href="inspiration.html"><span>💡</span>旅行靈感</a>
      <a href="trips.html"><span>🗺️</span>我的旅行</a>
      <a href="packing.html"><span>🧳</span>行李攻略</a>
      <a class="active" href="my.html" aria-current="page"><span>👤</span>我的</a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/travel-store.js"></script>
  <script src="js/profile-service.js"></script>
  <script src="js/account.js?v=20260713-refinement"></script>
  <script src="js/script.js"></script>
</body>
</html>
