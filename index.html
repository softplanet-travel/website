<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftPlanet 柔軟星球</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

  <!-- Header -->
 <header class="site-header">

    <div class="brand">

        <img
            class="brand-logo"
            src="https://pub-b81dcc9d028843a88c719d03c1eb29a1.r2.dev/assets/logo/softplanet-logo.webp"
            alt="SoftPlanet">

        <div>
            <div class="brand-name">SoftPlanet</div>
            <div class="brand-subtitle">柔軟星球</div>
        </div>

    </div>

    <div class="header-actions">

        <button class="icon-btn" aria-label="分享">
            ⤴
        </button>

        <button class="icon-btn" aria-label="選單">
            ☰
        </button>

    </div>

</header>
  <main>

     
   <section class="hero">

    <img
        class="hero-image"
        src="https://pub-b81dcc9d028843a88c719d03c1eb29a1.r2.dev/assets/hero/hero-home.webp"
        alt="SoftPlanet Hero">

    </section>

    <!-- CTA -->
    <section class="cta-grid">

      <a class="cta-card cta-inspiration" href="#">

        <div class="cta-icon">💡</div>

        <h2>我要旅行靈感</h2>

       <p>
  探索景點、美食與住宿。
</p>

        <span>開始探索 →</span>

      </a>

      <a class="cta-card cta-planner" href="#">

        <div class="cta-icon">🗺️</div>

        <h2>幫我規劃行程</h2>

       <p>
  快速建立你的專屬行程。
</p>

        <span>立即規劃 →</span>

      </a>

    </section>

    <!-- 熱門行程 -->
    <section class="popular-trips">

      <div class="section-head">
        <h2>🔥 熱門行程</h2>
        <a href="#">查看更多 ›</a>
      </div>

      <div class="trip-scroll">

        <article class="trip-card">

          <div class="trip-image trip-tokyo"></div>

          <div class="trip-content">

            <div class="trip-tag">
              日本・東京
            </div>

            <h3>
              東京5天4夜美食之旅
            </h3>

            <p>
              美食與親子一次滿足！
            </p>

            <button class="heart-btn">
              ♡
            </button>

          </div>

        </article>

        <article class="trip-card">

          <div class="trip-image trip-okinawa"></div>

          <div class="trip-content">

            <div class="trip-tag">
              日本・沖繩
            </div>

            <h3>
              沖繩5天4夜自駕遊
            </h3>

            <p>
              海島放鬆之旅
            </p>

            <button class="heart-btn">
              ♡
            </button>

          </div>

        </article>

        <article class="trip-card">

          <div class="trip-image trip-seoul"></div>

          <div class="trip-content">

            <div class="trip-tag">
              韓國・首爾
            </div>

            <h3>
              首爾5天4夜自由行
            </h3>

            <p>
              購物美食全攻略
            </p>

            <button class="heart-btn">
              ♡
            </button>

          </div>

        </article>

        <article class="trip-card">

          <div class="trip-image trip-hongkong"></div>

          <div class="trip-content">

            <div class="trip-tag">
              香港
            </div>

            <h3>
              香港4天3夜美食購物
            </h3>

            <p>
              港式美食不能錯過
            </p>

            <button class="heart-btn">
              ♡
            </button>

          </div>

        </article>

      </div>

    </section>

  </main>

  <!-- Navigation -->

  <nav class="bottom-nav">

    <a class="active" href="#">
      <span>🏠</span>
      首頁
    </a>

    <a href="#">
      <span>🗓️</span>
      行程規劃
    </a>

    <a href="#">
      <span>💡</span>
      旅行靈感
    </a>

    <a href="#">
      <span>🧳</span>
      行李攻略
    </a>

    <a href="#">
      <span>👤</span>
      我的
    </a>

  </nav>

</div>

<script src="js/script.js"></script>

</body>
</html>
