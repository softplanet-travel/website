<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftPlanet 柔軟星球</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#FAF8F4;
    color:#333;
}

header{
    background:#fff;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.hero{
    padding:80px 20px;
    text-align:center;
}

.hero h1{
    font-size:42px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    color:#666;
}

button{
    margin-top:30px;
    padding:16px 32px;
    border:none;
    border-radius:12px;
    background:#4BA3A6;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
🌏 SoftPlanet 柔軟星球
</header>

<section class="hero">
<h1>世界很大，我陪你慢慢看。</h1>

<p>
親子旅行 × 自由行攻略 × 美食 × 景點 × 行程規劃
</p>

<button id="google-login">
    使用 Google 登入
</button>

</section>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://ftlpxesmzchwzeurmupr.supabase.co",
  "sb_publishable_5fxS5Fm4dqXNFIMyVtTm0w_gnncuTRh"
);

const loginBtn = document.getElementById("google-login");

if (loginBtn) {
  loginBtn.addEventListener("click", async () => {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: window.location.origin
      }
    });

    if (error) {
      alert(error.message);
    }
  });
}

const {
  data: { session },
} = await supabase.auth.getSession();

if (session) {
  loginBtn.innerText =
    "我的 ";
    (session.user.user_metadata.full_name ||
      session.user.email);
}
</script>
</body>
</html>
